
name: "Issue/PR Tag"
on:
  workflow_call:
    inputs:
      org_name:
        required: true
        type: string
      tag_team:
        required: true
        type: string
      issue: 
        required: false
        type: string
      pr: 
        required: false
        type: string
    secrets:
      token:
        required: true

permissions:
  contents: read

jobs:
  notify:
    if: ${{ github.repository_owner == inputs.org_name }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: devops-actions/issue-comment-tag@3a605c5f21e15e5b963c866421bf4189bcc32310 # v0.1.10
        with:
          team: ${{ inputs.tag_team }}
          issue: ${{ inputs.issue }}
          pr: ${{ inputs.pr }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.token }}
